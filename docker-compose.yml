services:
  minio:
    image: minio/minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: homie-admin
      MINIO_ROOT_PASSWORD: change-this-minio-password
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:
